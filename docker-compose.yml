services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartsync
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data_new:/var/lib/postgresql/data

  nats:
    image: nats:latest
    ports:
      - "4222:4222"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    container_name: smartsync_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: smartsync_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  audit-service:
    build:
      context: .
      args:
        SERVICE_NAME: audit-service
    container_name: smartsync_audit_service
    depends_on:
      - nats
      - mongodb
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - MONGO_URI=mongodb://mongodb:27017

  gateway:
    build:
      context: .
      args:
        SERVICE_NAME: gateway
    container_name: smartsync_gateway
    ports:
      - "8000:8000"
    depends_on:
      - nats
      - postgres
      - audit-service
    restart: unless-stopped
    environment:
      - JWT_SECRET=smartsync_diploma_secret_key_2026
      - NATS_URL=nats://nats:4222
      - AUTH_SERVICE_URL=http://auth-service:8081
      - TASK_SERVICE_URL=http://task-service:8080
      - AUDIT_SERVICE_URL=http://audit-service:8083

  auth-service:
    build:
      context: .
      args:
        SERVICE_NAME: auth-service
    container_name: smartsync_auth_service
    ports:
      - "8081:8081"
    depends_on:
      - nats
      - postgres
    restart: unless-stopped
    environment:
      - JWT_SECRET=smartsync_diploma_secret_key_2026
      - DATABASE_URL=postgres://user:password@postgres:5432/smartsync?sslmode=disable

  task-service:
    build:
      context: .
      args:
        SERVICE_NAME: task-service
    container_name: smartsync_task_service
    ports:
      - "8080:8080"
    depends_on:
      - nats
      - postgres
      - redis
    restart: unless-stopped
    environment:
      - JWT_SECRET=smartsync_diploma_secret_key_2026
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://user:password@postgres:5432/smartsync?sslmode=disable

  priority-service:
    build:
      context: .
      args:
        SERVICE_NAME: priority-service
    container_name: smartsync_priority_service
    depends_on:
      - nats
      - postgres
      - redis
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgres://user:password@postgres:5432/smartsync?sslmode=disable

volumes:
  mongo_data:
  pg_data_new: