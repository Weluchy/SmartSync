<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSync - Управление проектами</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden font-sans">

    <div id="authScreen" class="absolute inset-0 bg-gray-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-96">
            <h1 class="text-3xl font-black text-center text-blue-600 mb-6">SmartSync</h1>
            <div class="flex gap-2 mb-6">
                <button onclick="setAuthMode('login')" id="tabLogin" class="flex-1 py-2 font-bold border-b-2 border-blue-600 text-blue-600">Вход</button>
                <button onclick="setAuthMode('register')" id="tabReg" class="flex-1 py-2 font-bold border-b-2 border-transparent text-gray-500">Регистрация</button>
            </div>
            <form id="authForm" class="flex flex-col gap-4">
                <input type="text" id="a_user" placeholder="Имя пользователя" class="border p-3 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" required>
                <input type="password" id="a_pass" placeholder="Пароль" class="border p-3 rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" required>
                <button type="submit" class="bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-2 shadow-lg">Войти</button>
            </form>
        </div>
    </div>

    <div id="projectSettingsModal" class="absolute inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-96 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-black text-gray-800">Настройки проекта</h2>
                <button onclick="closeProjectSettings()" class="text-gray-400 hover:text-red-500 font-bold text-lg">✕</button>
            </div>

            <div id="ownerControls">
                <div class="mb-4">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wide">Переименовать</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="editProjectName" class="border p-2 rounded flex-1 text-sm outline-none focus:border-blue-500">
                        <button onclick="renameCurrentProject()" class="bg-blue-600 text-white px-3 py-2 rounded text-sm font-bold shadow hover:bg-blue-700">OK</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="text-xs text-gray-500 font-bold uppercase tracking-wide">Пригласить участника</label>
                    <div class="flex gap-2 mt-1">
                        <input type="text" id="inviteUsername" placeholder="Введи логин друга" class="border p-2 rounded flex-1 text-sm outline-none focus:border-green-500">
                        <button onclick="inviteToProject()" class="bg-green-600 text-white px-3 py-2 rounded text-sm font-bold shadow hover:bg-green-700">✚</button>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-red-100">
                    <button onclick="deleteCurrentProject()" class="w-full bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-100 hover:text-red-700 transition">🗑 Удалить проект навсегда</button>
                </div>
            </div>

            <div id="guestMessage" class="hidden text-sm text-gray-500 text-center py-6 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                Ты приглашен в этот проект как участник.<br>Управлять настройками может только создатель.
            </div>
        </div>
    </div>

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden" id="sidebar">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h2 class="text-xl font-black text-gray-800">Проекты</h2>
            <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline">Выход</button>
        </div>
        <div class="p-4">
            <form id="projectForm" class="flex gap-2">
                <input type="text" id="p_name" placeholder="Новый проект..." class="border p-2 rounded w-full text-sm outline-none focus:border-blue-500" required>
                <button type="submit" class="bg-gray-800 text-white px-3 rounded font-bold hover:bg-gray-700">+</button>
            </form>
        </div>
        <ul id="projectList" class="flex-1 overflow-y-auto px-2 space-y-1">
            </ul>
    </aside>

    <main class="flex-1 flex flex-col relative hidden" id="mainApp">
        <header class="bg-white border-b border-gray-200 p-4 flex gap-6 items-start shadow-sm z-10">
            <form id="taskForm" class="flex gap-2 items-center border-r pr-6 border-gray-200">
                <input type="text" id="t_title" placeholder="Название задачи" class="border p-2 rounded w-48 text-sm" required>
                <input type="number" id="t_opt" placeholder="Опт (ч)" class="border p-2 rounded w-20 text-sm" required>
                <input type="number" id="t_real" placeholder="Реал (ч)" class="border p-2 rounded w-20 text-sm" required>
                <input type="number" id="t_pess" placeholder="Песс (ч)" class="border p-2 rounded w-20 text-sm" required>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-blue-700 transition">Добавить</button>
            </form>

            <form id="depForm" class="flex gap-2 items-center border-r pr-6 border-gray-200">
                <input type="number" id="d_parent" placeholder="ID (От кого зависит)" class="border p-2 rounded w-40 text-sm" required>
                <input type="number" id="d_child" placeholder="ID (Кто зависит)" class="border p-2 rounded w-40 text-sm" required>
                <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-green-700 transition">Связать</button>
            </form>

            <button onclick="resetDeps()" class="bg-gray-100 text-gray-700 px-4 py-2 rounded text-sm font-bold shadow-sm hover:bg-gray-200 transition ml-auto">
                Сбросить стрелки
            </button>
        </header>

        <div id="editMenu" class="absolute top-24 left-6 bg-white p-4 rounded-xl shadow-xl border border-gray-200 hidden z-20 w-64">
            <h3 class="font-bold text-sm mb-3 text-gray-700 border-b pb-2">Редактировать задачу</h3>
            <input type="text" id="e_title" class="w-full border p-2 rounded mb-3 text-sm focus:border-blue-500 outline-none" placeholder="Название">
            <div class="grid grid-cols-3 gap-2 mb-3">
                <div><label class="text-xs text-gray-500">Опт</label><input type="number" id="e_opt" class="border p-1.5 w-full rounded text-sm text-center"></div>
                <div><label class="text-xs text-gray-500">Реал</label><input type="number" id="e_real" class="border p-1.5 w-full rounded text-sm text-center"></div>
                <div><label class="text-xs text-gray-500">Песс</label><input type="number" id="e_pess" class="border p-1.5 w-full rounded text-sm text-center"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="saveEdit()" class="bg-blue-600 text-white px-3 py-2 flex-1 rounded text-sm font-bold shadow">Сохранить</button>
                <button onclick="closeEdit()" class="bg-gray-100 text-gray-700 px-3 py-2 rounded text-sm font-bold">Отмена</button>
            </div>
        </div>

        <div id="deleteMenu" class="absolute top-24 right-6 flex flex-col gap-2 hidden z-20">
            <button onclick="deleteSelectedNode(false)" class="bg-red-600 text-white px-4 py-3 rounded-lg text-sm font-bold shadow-lg hover:bg-red-700 transition flex items-center justify-between">
                <span>🗑 Удалить (Разорвать)</span>
            </button>
            <button onclick="deleteSelectedNode(true)" class="bg-orange-500 text-white px-4 py-3 rounded-lg text-sm font-bold shadow-lg hover:bg-orange-600 transition flex items-center justify-between">
                <span>🔗 Удалить (Сшить края)</span>
            </button>
        </div>

        <div id="mynetwork" class="flex-1 bg-gray-50"></div>
    </main>

    <script>
        const GATEWAY = "http://localhost:8000";
        let token = localStorage.getItem('token');
        let authMode = 'login';
        let currentProjectId = null;
        let network = null;

        // --- АВТОРИЗАЦИЯ ---
        function setAuthMode(mode) {
            authMode = mode;
            document.getElementById('tabLogin').className = mode === 'login' ? "flex-1 py-2 font-bold border-b-2 border-blue-600 text-blue-600" : "flex-1 py-2 font-bold border-b-2 border-transparent text-gray-500";
            document.getElementById('tabReg').className = mode === 'register' ? "flex-1 py-2 font-bold border-b-2 border-blue-600 text-blue-600" : "flex-1 py-2 font-bold border-b-2 border-transparent text-gray-500";
            document.querySelector('#authForm button').innerText = mode === 'login' ? "Войти" : "Зарегистрироваться";
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${GATEWAY}/${authMode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('a_user').value,
                    password: document.getElementById('a_pass').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                if (authMode === 'register') {
                    alert('Успешно! Теперь войдите.');
                    setAuthMode('login');
                } else {
                    token = data.token;
                    localStorage.setItem('token', token);
                    checkSession();
                }
            } else { alert(data.error); }
        };

        function logout() {
            localStorage.removeItem('token');
            token = null;
            checkSession();
        }

        async function checkSession() {
            if (token) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await loadProjects();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        }

        // --- ПРОЕКТЫ ---
        document.getElementById('projectForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(`${GATEWAY}/projects`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ name: document.getElementById('p_name').value })
            });
            e.target.reset();
            loadProjects();
        };

        async function loadProjects() {
            const res = await fetch(`${GATEWAY}/projects`, { headers: {'Authorization': `Bearer ${token}`} });
            if (res.status === 401) return logout();
            const projects = await res.json();
            
            const list = document.getElementById('projectList');
            list.innerHTML = '';
            
            projects.forEach(p => {
                const li = document.createElement('li');
                const isActive = currentProjectId === p.id;
                li.className = `p-2 rounded-lg cursor-pointer flex justify-between items-center transition ${isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}`;
                
                // Если мы гость, вешаем красивый фиолетовый бейдж
                let roleBadge = p.role === 'owner' ? '' : `<span class="text-[10px] bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded-full ml-2 font-bold">гость</span>`;
                
                li.innerHTML = `
                    <div class="flex-1 font-medium text-sm truncate flex items-center" onclick="selectProject(${p.id})">
                        ${p.name} ${roleBadge}
                    </div>
                    <button onclick="openProjectSettings(${p.id}, '${p.name}', '${p.role}')" class="text-gray-400 hover:text-gray-800 px-2 text-lg transition">⚙️</button>
                `;
                list.appendChild(li);
            });

            if (projects.length > 0 && !currentProjectId) {
                selectProject(projects[0].id);
            }
        }

        // --- УПРАВЛЕНИЕ НАСТРОЙКАМИ ПРОЕКТА ---
        let editingProjectId = null;

        function openProjectSettings(id, name, role) {
            editingProjectId = id;
            document.getElementById('projectSettingsModal').classList.remove('hidden');
            document.getElementById('editProjectName').value = name;
            
            if (role === 'owner') {
                document.getElementById('ownerControls').classList.remove('hidden');
                document.getElementById('guestMessage').classList.add('hidden');
            } else {
                document.getElementById('ownerControls').classList.add('hidden');
                document.getElementById('guestMessage').classList.remove('hidden');
            }
        }

        function closeProjectSettings() {
            document.getElementById('projectSettingsModal').classList.add('hidden');
            editingProjectId = null;
        }

        async function renameCurrentProject() {
            const newName = document.getElementById('editProjectName').value;
            await fetch(`${GATEWAY}/projects/${editingProjectId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ name: newName })
            });
            closeProjectSettings();
            loadProjects();
        }

        async function deleteCurrentProject() {
            if (!confirm("Точно удалить проект? Все задачи и связи будут безвозвратно стерты!")) return;
            await fetch(`${GATEWAY}/projects/${editingProjectId}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            currentProjectId = null; // Сбрасываем выбранный проект
            closeProjectSettings();
            loadProjects(); // Загрузит список и выберет первый доступный проект
        }

        async function inviteToProject() {
            const username = document.getElementById('inviteUsername').value;
            const res = await fetch(`${GATEWAY}/projects/${editingProjectId}/members`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ username: username })
            });
            
            const data = await res.json();
            if (res.ok) {
                alert("Пользователь успешно приглашен!");
                document.getElementById('inviteUsername').value = '';
            } else {
                alert("Ошибка: " + data.error);
            }
        }

        function selectProject(id) {
            currentProjectId = id;
            loadProjects(); // Перерисовываем список для подсветки активного
            loadGraph();
        }

        // --- ЗАДАЧИ И ГРАФ ---
        document.getElementById('taskForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!currentProjectId) return alert("Выберите проект!");
            await fetch(`${GATEWAY}/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({
                    project_id: currentProjectId, // ТЕПЕРЬ ПРИВЯЗЫВАЕМ К ПРОЕКТУ!
                    title: document.getElementById('t_title').value,
                    opt: parseInt(document.getElementById('t_opt').value) || 1,
                    real: parseInt(document.getElementById('t_real').value) || 1,
                    pess: parseInt(document.getElementById('t_pess').value) || 1
                })
            });
            e.target.reset();
            setTimeout(loadGraph, 400); 
        };

        document.getElementById('depForm').onsubmit = async (e) => {
            e.preventDefault();
            const taskId = document.getElementById('d_child').value;
            const dependsOnId = document.getElementById('d_parent').value;
            await fetch(`${GATEWAY}/tasks/${taskId}/dependencies`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({ depends_on_id: parseInt(dependsOnId) })
            });
            e.target.reset();
            setTimeout(loadGraph, 400); 
        };

        async function resetDeps() {
            if (!currentProjectId || !confirm("Удалить все связи в этом проекте?")) return;
            await fetch(`${GATEWAY}/projects/${currentProjectId}/dependencies`, { // СБРОС ТОЛЬКО В ПРОЕКТЕ
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`} 
            });
            setTimeout(loadGraph, 400); 
        }

        // --- УДАЛЕНИЕ И РЕДАКТИРОВАНИЕ ---
        window.deleteSelectedNode = async (heal) => {
            const actionText = heal ? "Удалить и сшить соседей напрямую?" : "Разорвать связи и удалить?";
            if (!confirm(actionText)) return;
            
            const selectedNodes = network.getSelectedNodes(); 
            if (selectedNodes.length === 0) return;
            
            await fetch(`${GATEWAY}/tasks/${selectedNodes[0]}?heal=${heal}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            document.getElementById('deleteMenu').classList.add('hidden');
            setTimeout(loadGraph, 400); 
        };

        window.closeEdit = () => document.getElementById('editMenu').classList.add('hidden');

        window.saveEdit = async () => {
            const selectedNodes = network.getSelectedNodes(); 
            if (selectedNodes.length === 0) return;
            
            await fetch(`${GATEWAY}/tasks/${selectedNodes[0]}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({
                    title: document.getElementById('e_title').value,
                    opt: parseInt(document.getElementById('e_opt').value),
                    real: parseInt(document.getElementById('e_real').value),
                    pess: parseInt(document.getElementById('e_pess').value)
                })
            });
            closeEdit();
            setTimeout(loadGraph, 400); 
        };

        // --- ОТРИСОВКА ГРАФА ---
        let currentGraphData = null;

        async function loadGraph() {
            if (!currentProjectId) return;
            // ЗАПРАШИВАЕМ ГРАФ ТОЛЬКО ДЛЯ ВЫБРАННОГО ПРОЕКТА
            const res = await fetch(`${GATEWAY}/projects/${currentProjectId}/graph`, { headers: {'Authorization': `Bearer ${token}`} });
            const data = await res.json();
            currentGraphData = data;

            const nodes = new vis.DataSet(data.nodes?.map(t => ({
                id: t.id,
                label: `[${t.id}] ${t.title}\nPrior: ${t.priority_score.toFixed(1)}h`,
                shape: 'box',
                color: { background: '#ffffff', border: '#cbd5e1' },
                font: { size: 14, color: '#1e293b', face: 'system-ui' },
                margin: 10,
                shadow: true
            })) || []);

            const edges = new vis.DataSet(data.edges?.map(e => ({
                from: e.from,
                to: e.to,
                arrows: 'to',
                color: { color: '#94a3b8' },
                smooth: { type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 }
            })) || []);

            if (network) network.destroy(); // Удаляем старый граф перед отрисовкой нового

            network = new vis.Network(document.getElementById('mynetwork'), {nodes, edges}, {
                layout: { hierarchical: { direction: 'LR', sortMethod: 'directed', levelSeparation: 200 } },
                physics: false,
                interaction: { hover: true, multiselect: false }
            });

            network.on("selectNode", function (params) {
                document.getElementById('deleteMenu').classList.remove('hidden');
                const nodeId = params.nodes[0];
                const nodeData = currentGraphData.nodes.find(n => n.id === nodeId); 
                
                if (nodeData) {
                    document.getElementById('editMenu').classList.remove('hidden');
                    document.getElementById('e_title').value = nodeData.title;
                    document.getElementById('e_opt').value = nodeData.opt;
                    document.getElementById('e_real').value = nodeData.real;
                    document.getElementById('e_pess').value = nodeData.pess;
                }
            });

            network.on("deselectNode", function () {
                document.getElementById('deleteMenu').classList.add('hidden');
                document.getElementById('editMenu').classList.add('hidden');
            });
        }

        // Запуск
        checkSession();
    </script>
</body>
</html>
