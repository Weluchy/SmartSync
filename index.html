<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SmartSync | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="authScreen" class="min-h-screen flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg w-96 border-t-4 border-blue-600">
            <h1 class="text-2xl font-black text-center text-gray-800 mb-6">SmartSync Login</h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Логин" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Пароль" class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleAuth('login')" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">Войти</button>
                <button onclick="handleAuth('register')" class="w-full text-blue-600 font-medium hover:underline text-sm">Нет аккаунта? Создать</button>
            </div>
            <p id="authError" class="text-red-500 text-xs mt-4 text-center"></p>
        </div>
    </div>

    <div id="mainScreen" class="hidden p-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-blue-600">SmartSync</h1>
                <p id="userInfo" class="text-gray-500 text-sm font-medium"></p>
            </div>
            <button onclick="logout()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition">Выйти</button>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-blue-500">
                    <h2 class="font-bold mb-4">Новая задача</h2>
                    <form id="taskForm" class="space-y-4">
                        <input type="text" id="t_title" placeholder="Название..." required class="w-full border p-2.5 rounded-lg">
                        <div class="grid grid-cols-3 gap-2 text-center">
                            <input type="number" id="t_opt" placeholder="O" class="border p-2 rounded">
                            <input type="number" id="t_real" placeholder="M" class="border p-2 rounded">
                            <input type="number" id="t_pess" placeholder="P" class="border p-2 rounded">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-bold">Добавить</button>
                    </form>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-emerald-500">
                    <h2 class="font-bold mb-4">Создать зависимость</h2>
                    <form id="depForm" class="flex gap-2">
                        <input type="number" id="d_child" placeholder="ID кто ждет" class="w-1/2 border p-2 rounded">
                        <input type="number" id="d_parent" placeholder="ID родитель" class="w-1/2 border p-2 rounded">
                        <button type="submit" class="bg-emerald-600 text-white px-4 rounded font-bold">+</button>
                    </form>
                </div>
            </div>
            <div class="col-span-8 bg-white p-6 rounded-xl shadow-sm relative">
                <div id="mynetwork" style="height: 500px;"></div>
                <button onclick="resetDeps()" class="absolute bottom-4 left-4 bg-red-50 text-red-600 px-3 py-1 rounded text-xs font-bold border border-red-200">Сбросить граф</button>
            </div>
            <div id="deleteMenu" class="absolute top-4 right-4 flex flex-col gap-2 hidden z-10">
                <button onclick="deleteSelectedNode(false)" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-red-700 transition">
                 🗑 Удалить (Разорвать связи)
                </button>
                <button onclick="deleteSelectedNode(true)" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-orange-600 transition">
                 🔗 Удалить (Сшить края)
                </button>
            </div>
            
            <div id="editMenu" class="absolute top-4 left-4 bg-white p-4 rounded-xl shadow-lg border border-gray-200 hidden z-10 w-64">
    <h3 class="font-bold text-sm mb-2 text-gray-700">Редактировать задачу</h3>
    <input type="text" id="e_title" class="w-full border p-1.5 rounded mb-2 text-sm" placeholder="Название">
    <div class="grid grid-cols-3 gap-1 mb-2">
        <input type="number" id="e_opt" class="border p-1 rounded text-xs text-center" placeholder="O">
        <input type="number" id="e_real" class="border p-1 rounded text-xs text-center" placeholder="M">
        <input type="number" id="e_pess" class="border p-1 rounded text-xs text-center" placeholder="P">
    </div>
    <div class="flex gap-2">
        <button onclick="saveEdit()" class="bg-blue-600 text-white px-2 py-1.5 flex-1 rounded text-xs font-bold">Сохранить</button>
        <button onclick="closeEdit()" class="bg-gray-200 text-gray-700 px-2 py-1.5 rounded text-xs font-bold">Отмена</button>
    </div>
</div>
        </div>
    </div>

    <script>
        const GATEWAY = 'http://localhost:8000';
        let token = localStorage.getItem('token');

        function checkSession() {
            if (!token) {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainScreen').classList.add('hidden');
            } else {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                document.getElementById('userInfo').innerText = `Сессия активна`;
                loadGraph();
            }
        }

        async function handleAuth(type) {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch(`${GATEWAY}/${type}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    checkSession();
                } else if (type === 'register') {
                    alert("Успешно! Теперь войдите.");
                } else {
                    document.getElementById('authError').innerText = data.error || "Ошибка";
                }
            } catch (e) { console.error(e); }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        async function loadGraph() {
            const res = await fetch(`${GATEWAY}/graph`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (res.status === 401) return logout();
            const data = await res.json();
            
      
            const nodes = new vis.DataSet(data.nodes ? data.nodes.map(n => ({
                id: n.id, 
                label: `ID:${n.id}\n${n.title}\n${n.priority_score.toFixed(1)}`,
                color: n.priority_score > n.duration_hours ? '#fca5a5' : '#bfdbfe',
                shape: 'box'
            })) : []);
            
            const edges = new vis.DataSet(data.edges ? data.edges.map(e => ({from: e.from, to: e.to, arrows: 'to'})) : []);

            // Сохраняем сеть в глобальную переменную
            window.network = new vis.Network(document.getElementById('mynetwork'), {nodes, edges}, {
                layout: {hierarchical: {direction: 'LR'}},
                interaction: { hover: true, multiselect: false }
            });

            // Обработка выделения узла
            window.network.on("selectNode", function (params) {
                document.getElementById('deleteMenu').classList.remove('hidden');
                
                // Находим данные выделенного узла из графа
                const nodeId = params.nodes[0];
                // В data.nodes лежат сырые данные с бэкенда
                const nodeData = data.nodes.find(n => n.id === nodeId); 
                
                if (nodeData) {
                    document.getElementById('editMenu').classList.remove('hidden');
                    document.getElementById('e_title').value = nodeData.title;
                    document.getElementById('e_opt').value = nodeData.opt;
                    document.getElementById('e_real').value = nodeData.real;
                    document.getElementById('e_pess').value = nodeData.pess;
                }
            });
            window.network.on("deselectNode", function () {
                document.getElementById('deleteMenu').classList.add('hidden');
                document.getElementById('editMenu').classList.add('hidden');
            });
        }

        document.getElementById('taskForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(`${GATEWAY}/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({
                    title: document.getElementById('t_title').value,
                    opt: parseInt(document.getElementById('t_opt').value) || 1,
                    real: parseInt(document.getElementById('t_real').value) || 1,
                    pess: parseInt(document.getElementById('t_pess').value) || 1
                })
            });
            
            // Очищаем форму, чтобы было удобно вводить следующую задачу
            e.target.reset();
            
            // Ждем пересчета от Math Engine перед загрузкой графа
            setTimeout(loadGraph, 400); 
        };

        // 1. Функция создания зависимости
        document.getElementById('depForm').onsubmit = async (e) => {
            e.preventDefault();
            const taskId = document.getElementById('d_child').value;
            const dependsOnId = document.getElementById('d_parent').value;
            
            await fetch(`${GATEWAY}/tasks/${taskId}/dependencies`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ depends_on_id: parseInt(dependsOnId) })
            });
            
            // Очищаем форму и обновляем граф
            e.target.reset();
            setTimeout(loadGraph, 400); // Ждем пересчета от Math Engine
        };

        // 2. Функция сброса графа
        async function resetDeps() {
            if (!confirm("Удалить все связи? Задачи останутся.")) return;
            
            await fetch(`${GATEWAY}/dependencies`, { 
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`} 
            });
            
            setTimeout(loadGraph, 400); 
        }

        
        // Глобальная функция удаления с параметром heal (сшивать или нет)
        window.deleteSelectedNode = async (heal) => {
            const actionText = heal ? "Удалить задачу и связать ее соседей напрямую?" : "Удалить задачу и разорвать все ее связи?";
            if (!confirm(actionText)) return;
            
            const selectedNodes = window.network.getSelectedNodes();
            if (selectedNodes.length === 0) return;
            
            const taskId = selectedNodes[0];
            
            // Отправляем запрос с параметром heal
            await fetch(`${GATEWAY}/tasks/${taskId}?heal=${heal}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            
            document.getElementById('deleteMenu').classList.add('hidden');
            setTimeout(loadGraph, 400); 
        };

        window.closeEdit = () => {
            document.getElementById('editMenu').classList.add('hidden');
        };

        window.saveEdit = async () => {
            const selectedNodes = window.network.getSelectedNodes();
            if (selectedNodes.length === 0) return;
            
            const taskId = selectedNodes[0];
            await fetch(`${GATEWAY}/tasks/${taskId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({
                    title: document.getElementById('e_title').value,
                    opt: parseInt(document.getElementById('e_opt').value),
                    real: parseInt(document.getElementById('e_real').value),
                    pess: parseInt(document.getElementById('e_pess').value)
                })
            });
            
            closeEdit();
            setTimeout(loadGraph, 400); 
        };

        checkSession();
    </script>
</body>
</html>
